<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>scc — demo (Lumen)</title>

  <!-- scc: the whole point — one stylesheet, no build -->
  <link rel="stylesheet" href="../scc.css">
  <!-- example theme (forked contract), available from the theme selector -->
  <link rel="stylesheet" href="../themes/sunset.css">
  <!-- demo chrome (app shell layout). ?v bumped on each edit so a normal reload
       picks up changes even when the dev server sends no Cache-Control. -->
  <link rel="stylesheet" href="app.css?v=7">

  <!-- Lumen via native ES modules, vendored & pinned (no CDN, no build) -->
  <script type="importmap">
  {
    "imports": {
      "lumenjs": "./vendor/lumen/src/index.js",
      "lumenjs/": "./vendor/lumen/src/"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <!-- ══ Templates: markup lives here; behavior in app/*.js; code panels auto-filled ══ -->

  <template id="layout">
    <div class="shell">
      <nav class="navbar">
        <a href="#/" data-brand>Scoped Cascade CSS</a>
        <span data-nav-end>
          <button data-variant="ghost" data-ref="langBtn" aria-label="Language / Idioma">🌐 EN</button>
          <button data-variant="ghost" data-ref="modeBtn" aria-label="Toggle light mode">🌗 Light: auto</button>
          <select data-ref="themeSel" aria-label="Theme">
            <option value="">Theme: default</option>
            <option value="sunset">Theme: sunset</option>
          </select>
          <button data-variant="primary" data-ref="customizeBtn">🎛 Tokens</button>
          <a class="icon-link" href="https://github.com/dragones-tech/scc" target="_blank" rel="noopener" aria-label="View scc on GitHub">
            <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"></path></svg>
          </a>
        </span>
      </nav>
      <div class="shell-body">
        <aside class="app-nav" data-ref="menu">
          <a href="#/" data-i18n="nav.home">Home</a>
          <a href="#/forms" data-i18n="nav.forms">Forms</a>
          <a href="#/containers" data-i18n="nav.containers">Containers</a>
          <a href="#/layout" data-i18n="nav.layout">Layout</a>
          <a href="#/nav" data-i18n="nav.nav">Navigation</a>
          <a href="#/feedback" data-i18n="nav.feedback">Feedback</a>
          <a href="#/primitives" data-i18n="nav.primitives">Primitives</a>
          <a href="#/guide" data-i18n="nav.guide">Guide</a>
        </aside>
        <main class="content" data-ref="outlet"></main>
      </div>
    </div>

  <template id="sec-home">

      <!-- HERO — split: copy on the left, code→result on the right -->

  <span class="tok-punct">&lt;</span><span class="tok-tag">h2</span><span class="tok-punct">&gt;</span>scc<span class="tok-punct">&lt;/</span><span class="tok-tag">h2</span><span class="tok-punct">&gt;</span>
  <span class="tok-punct">&lt;</span><span class="tok-tag">p</span><span class="tok-punct">&gt;</span>Sin build, sin magia.<span class="tok-punct">&lt;/</span><span class="tok-tag">p</span><span class="tok-punct">&gt;</span>
  <span class="tok-punct">&lt;</span><span class="tok-tag">footer</span><span class="tok-punct">&gt;</span>
    <span class="tok-punct">&lt;</span><span class="tok-tag">button</span> <span class="tok-attr">data-variant</span>=<span class="tok-str">"primary"</span><span class="tok-punct">&gt;</span>Empezar<span class="tok-punct">&lt;/</span><span class="tok-tag">button</span><span class="tok-punct">&gt;</span>
  <span class="tok-punct">&lt;/</span><span class="tok-tag">footer</span><span class="tok-punct">&gt;</span>
<span class="tok-punct">&lt;/</span><span class="tok-tag">article</span><span class="tok-punct">&gt;</span></code></pre>
          </figure>
          <span class="code-arrow" aria-hidden="true">↓ se ve así</span>
          <div class="hero-live">
            <article class="card">
              <h2>scc</h2>
              <p>Sin build, sin magia.</p>
              <footer><button data-variant="primary">Empezar</button></footer>
            </article>
          </div>
        </div>
      </section>

      <!-- STATS band -->
      <section class="stats reveal">
        <div class="metric" style="--tone: var(--accent)"><strong>30</strong><span data-i18n="home.statComponents"></span></div>

        <div class="metric" style="--tone: var(--warning)"><strong>0</strong><span data-i18n="home.statBuild"></span></div>
        <div class="metric" style="--tone: var(--danger)"><strong>0</strong><span data-i18n="home.statDeps"></span></div>
      </section>

      <!-- PILLARS — small, colored feature cards -->
      <section class="home-block reveal">
        <header class="block-head">
          <h2 data-i18n="home.pillarsTitle"></h2>
          <p data-i18n="home.pillarsSub"></p>
        </header>
        <div class="features">
          <article class="feature" style="--tone: var(--accent)">
            <span class="feature-icon" aria-hidden="true">⚡</span>
            <h3 data-i18n="home.pillar1Title"></h3>
            <p data-i18n="home.pillar1Desc"></p>
          </article>
          <article class="feature" style="--tone: var(--success)">
            <span class="feature-icon" aria-hidden="true">✦</span>
            <h3 data-i18n="home.pillar2Title"></h3>
            <p data-i18n="home.pillar2Desc"></p>

            <p data-i18n="home.pillar3Desc"></p>
          </article>
        </div>
      </section>

      <!-- GOLDEN RULE -->
      <section class="home-block reveal">
        <header class="block-head">
          <h2 data-i18n="home.ruleTitle"></h2>
          <p data-i18n="home.ruleSub"></p>
        </header>
        <div class="compare">
          <article class="card" data-rule="bad">
            <h3>✗ utility-first</h3>
            <p data-i18n="home.badDesc"></p>
            <pre class="demo-code"><code><span class="tok-comment">&lt;!-- ✗ la apariencia vive en la clase --&gt;</span>
<span class="tok-punct">&lt;</span><span class="tok-tag">article</span> <span class="tok-attr">class</span>=<span class="tok-str">"rounded-lg shadow p-6 bg-white"</span><span class="tok-punct">&gt;</span>…<span class="tok-punct">&lt;/</span><span class="tok-tag">article</span><span class="tok-punct">&gt;</span></code></pre>
          </article>
          <article class="card" data-rule="good">
            <h3>✓ scc</h3>
            <p data-i18n="home.goodDesc"></p>
            <pre class="demo-code"><code><span class="tok-comment">&lt;!-- ✓ el HTML dice qué es --&gt;</span>
<span class="tok-punct">&lt;</span><span class="tok-tag">article</span> <span class="tok-attr">class</span>=<span class="tok-str">"card"</span><span class="tok-punct">&gt;</span>
  <span class="tok-punct">&lt;</span><span class="tok-tag">h2</span><span class="tok-punct">&gt;</span>Título<span class="tok-punct">&lt;/</span><span class="tok-tag">h2</span><span class="tok-punct">&gt;</span>
  <span class="tok-punct">&lt;</span><span class="tok-tag">p</span><span class="tok-punct">&gt;</span>Texto…<span class="tok-punct">&lt;/</span><span class="tok-tag">p</span><span class="tok-punct">&gt;</span>
<span class="tok-punct">&lt;/</span><span class="tok-tag">article</span><span class="tok-punct">&gt;</span></code></pre>
          </article>
        </div>
      </section>

      <!-- ARCHITECTURE -->
      <section class="home-block reveal">
        <header class="block-head">
          <h2 data-i18n="home.archTitle"></h2>
          <p data-i18n="home.archSub"></p>
        </header>
        <div class="layer-flow">
          <span class="chip">reset</span><span class="layer-arrow" aria-hidden="true">→</span>
          <span class="chip">theme</span><span class="layer-arrow" aria-hidden="true">→</span>
          <span class="chip">tokens</span><span class="layer-arrow" aria-hidden="true">→</span>
          <span class="chip">base</span><span class="layer-arrow" aria-hidden="true">→</span>
          <span class="chip">components</span><span class="layer-arrow" aria-hidden="true">→</span>
          <span class="chip">utilities</span>
        </div>
      </section>

      <!-- TWO AXES + THEME -->

        <header class="block-head">
          <h2 data-i18n="home.axesTitle"></h2>
          <p data-i18n="home.axesSub"></p>

        </div>
      </section>

          <a href="#/feedback" data-button data-i18n="nav.feedback"></a>
          <a href="#/primitives" data-button data-i18n="nav.primitives"></a>
        </div>
      </section>

      <p class="home-req" data-i18n="home.req"></p>
    </div>
